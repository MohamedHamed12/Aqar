spring:
  application:
    name: aqar

  datasource:
    url: jdbc:postgresql://localhost:5432/aqar
    username: aqar
    password: aqar

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  security:
    jwt:
      issuer: aqar
      secret: change-this-development-secret-to-a-long-random-value-change-this-development-secret
      access-token-ttl: 15m
    refresh-token:
      ttl: 7d

  dropbox:
    access-token: ${DROPBOX_ACCESS_TOKEN:}
    app-folder: /Apps/Aqar
    shared-link-ttl: 4h

  redis:
    lock-ttl: 5000

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    server: ${SWAGGER_SERVER_URL:http://localhost:8080}
  api-docs:
    path: /api-docs
  show-actuator: false
  cache:
    disabled: true
  paths-to-exclude: /error

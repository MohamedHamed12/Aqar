services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: aqar-postgres
    environment:
      POSTGRES_DB: aqar
      POSTGRES_USER: aqar
      POSTGRES_PASSWORD: aqar
    ports:
      - "5432:5432"
    volumes:
      - aqar_postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: pg_isready -U aqar -d aqar
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7
    container_name: aqar-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aqar-app
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  aqar_postgres_data:
